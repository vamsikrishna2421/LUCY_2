workflows:
  ios-testflight:
    name: LUCY — iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - ios-creds    # variable group name you create in Codemagic app settings
      vars:
        BUNDLE_ID: com.anonymous.lucy
        XCODE_SCHEME: lucy

    triggering:
      events: []   # manual builds only — start from Codemagic dashboard

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Apply patches
        script: npx patch-package

      - name: Auto-increment build number BEFORE prebuild
        script: |
          # Expo's Info.plist uses CFBundleVersion = $(CURRENT_PROJECT_VERSION), so the
          # value MUST be set in app.json BEFORE `expo prebuild` bakes it into the Xcode
          # build settings (editing Info.plist after prebuild does nothing).
          #
          # Use Codemagic's monotonic $BUILD_NUMBER + 100 offset. BUILD_NUMBER is always
          # set and increments every build; +100 clears the last manual upload (1.0.60)
          # and keeps growing. No git depth / Apple ID needed. Prevents the App Store
          # Connect "build number already used" failure.
          NUM=$(( ${BUILD_NUMBER:-1} + 100 ))
          BUILD_NUM="1.0.$NUM"
          node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('app.json','utf8'));a.expo.ios=a.expo.ios||{};a.expo.android=a.expo.android||{};a.expo.ios.buildNumber='$BUILD_NUM';a.expo.android.versionCode=$NUM;fs.writeFileSync('app.json',JSON.stringify(a,null,2));console.log('iOS buildNumber=',a.expo.ios.buildNumber,'| android versionCode=',a.expo.android.versionCode);"

      - name: Expo prebuild (generate native iOS project)
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          # Find the actual workspace name generated by expo prebuild
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(find ios -name "*.xcodeproj" -maxdepth 1 | head -1 | xargs basename | sed 's/.xcodeproj//')
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - vamsy.24@gmail.com
        notify:
          success: true
          failure: true

  android-apk:
    name: LUCY — Android APK
    max_build_duration: 90
    # Use the same Mac instance the iOS job uses — the personal billing plan only
    # has this instance enabled (linux_x2 fails with "instance type not available").
    # Codemagic's macOS images ship the full Android SDK + JDK, so Gradle builds fine.
    instance_type: mac_mini_m2

    environment:
      node: latest
      java: 17
      vars:
        PACKAGE_NAME: com.anonymous.lucy

    triggering:
      events: []   # manual builds only — start from the Codemagic dashboard

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Apply patches
        script: npx patch-package

      - name: Auto-increment versionCode BEFORE prebuild
        script: |
          # Expo bakes android.versionCode into the native project during prebuild,
          # so it MUST be set in app.json first. Use Codemagic's monotonic
          # $BUILD_NUMBER + 100 (mirrors the iOS workflow) so versionCode always grows.
          NUM=$(( ${BUILD_NUMBER:-1} + 100 ))
          node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('app.json','utf8'));a.expo.android=a.expo.android||{};a.expo.android.versionCode=$NUM;fs.writeFileSync('app.json',JSON.stringify(a,null,2));console.log('android versionCode=',a.expo.android.versionCode);"

      - name: Expo prebuild (generate native Android project)
        script: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        script: |
          # Expo's prebuild template signs the release buildType with the standard
          # Android debug keystore, so assembleRelease produces an installable,
          # side-loadable APK with no extra keystore setup. (Not Play-Store eligible —
          # that would need a real upload keystore, which we can add later.)
          cd android
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - vamsy.24@gmail.com
        notify:
          success: true
          failure: true
