<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>LUCY</title>
<style>
/* LUCY web - premium - dashboard rev 68 (bigger music-mood headphones that hug the head;
   App-parity features + spring motion:
   • Money: auto-detected savings-goal suggestion banner ("save 2000 for the move by Aug" → Create goal), via /api/money/goal-suggestion
   • Money: savings goals (Vamsi #2) — target + deadline tracked by contributions, on/off-track pacing bar, via /api/money/goals (+/contribute)
   • Projects: rename/edit a project (short headline + description) via /api/projects/update — old name kept as alias so items still gather
   • Projects: project autopilot suggestions with ＋ Create / Add to existing (merge) / Dismiss, via /api/projects/suggestions + /merge; smarter dedup hides near-duplicates of existing projects
   • Tasks: commitment guardian — promises you made + things owed to you, at-risk in rose/amber, Done/Dismiss, via /api/commitments
   • Health: mood-over-time SVG graph (teal/rose, real gaps, shift caption, tap-a-day → "what was happening") via /api/mood-graph
   • Money: money-watch (upcoming bills + recurring/subscriptions + Lucy-noticed insights) via /api/money; flips Market subscription-detection cell to ✅
   • Calendar/Workspace: Shape-your-day editor — office hours, workday toggles, sleep, + 3 mouse-draggable energy curves (brain/muscle/attention) via GET/POST /api/schedule/availability
   • People: keep-warm reach-out nudges via /api/keepwarm
   • Schedule suggestions now surface human reasons + rationale ("why")
   • Motion: spring view fade, staggered .rise card entrances, button press feedback, expand/collapse, honors prefers-reduced-motion
   Prior: rev 61 scans gallery + medications mirror; desktop alerts from rev 59) */
[data-theme="dark"]{
  --bg:#0A0907; --bg2:#100D0A; --side:#121009; --side2:#0C0A07;
  --card:#171410; --card2:#1C1813; --raised:#221D16; --elevated:#2A2219;
  --text:#F5EFE6; --muted:#C4A882; --subtle:#8A7560; --faint:#5C4A38;
  --border:#2A2017; --border-soft:#1F1710; --divider:#1C1610;
  --primary:#FF8C42; --primary-glow:#FFA05C; --primary-deep:#E8722A; --primary-soft:#3D1D08;
  --on-primary:#1a0e03;
  --shadow:0 18px 50px rgba(0,0,0,.5); --shadow-sm:0 6px 18px rgba(0,0,0,.35);
  --orb-a:#FFCB8F; --orb-b:#FF8C42; --orb-c:#9A3D12; --orb-d:#3A1606;
  --glow:rgba(255,140,66,.45); --ambient1:rgba(255,140,66,.10); --ambient2:rgba(255,140,66,.05);
  --tag-text:#C4A882; --tag-bg:#221D16;
}
[data-theme="light"]{
  --bg:#F3E9DC; --bg2:#F8F0E6; --side:#FBF6EF; --side2:#F6EEE3;
  --card:#FFFFFF; --card2:#FDF8F2; --raised:#F6EEE3; --elevated:#FFFFFF;
  --text:#3A2E22; --muted:#7A6450; --subtle:#9C876E; --faint:#B9A488;
  --border:#EAD9C6; --border-soft:#F0E3D4; --divider:#EFE2D3;
  --primary:#E8722A; --primary-glow:#FF8C42; --primary-deep:#C2531A; --primary-soft:#FBE4D2;
  --on-primary:#FFFFFF;
  --shadow:0 18px 44px rgba(180,120,70,.18); --shadow-sm:0 6px 16px rgba(180,120,70,.12);
  --orb-a:#FFF1E2; --orb-b:#FFC79A; --orb-c:#FF9A5B; --orb-d:#E8722A;
  --glow:rgba(255,150,80,.40); --ambient1:rgba(255,160,90,.16); --ambient2:rgba(255,180,120,.10);
  --tag-text:#7A6450; --tag-bg:#F3E9DC;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,system-ui,sans-serif;
  font-size:15px; line-height:1.5; letter-spacing:.1px; overflow:hidden; -webkit-font-smoothing:antialiased;
  transition:background .4s,color .3s;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(1100px 700px at 60% -10%, var(--ambient1), transparent 55%),
    radial-gradient(700px 500px at 105% 115%, var(--ambient2), transparent 60%);
  transition:background .4s;
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--elevated)}
button{font-family:inherit;cursor:pointer;color:inherit}

#shell{position:relative;z-index:1;display:flex;height:100%}

/* ─── Sidebar ─── */
#side{width:240px;flex:0 0 240px;height:100%;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--side),var(--side2));border-right:1px solid var(--border-soft);padding:22px 16px;transition:background .4s}
.brand{display:flex;align-items:center;gap:9px;padding:2px 8px 14px;position:relative}
.brand .logo{font-size:22px;font-weight:800;letter-spacing:2px}
.brand .spark{color:var(--primary);font-size:14px;margin-left:-2px;margin-top:-8px}
nav{display:flex;flex-direction:column;gap:1px}
.side-spacer{flex:1;min-height:6px}
.nav-i{display:flex;align-items:center;gap:13px;padding:7px 14px;border-radius:11px;color:var(--muted);
  font-weight:550;font-size:14px;border:1px solid transparent;transition:.15s;user-select:none}
.nav-i:hover{background:var(--raised);color:var(--text)}
.nav-i.on{background:var(--primary-soft);color:var(--primary-deep);font-weight:650}
[data-theme="dark"] .nav-i.on{color:var(--primary-glow)}
.nav-i .ic{width:20px;text-align:center;font-size:15px;flex:0 0 20px}
.nav-i .badge{margin-left:auto;font-size:11px;color:var(--subtle);background:var(--raised);padding:1px 8px;border-radius:20px}
.nav-i.on .badge{color:var(--primary-deep);background:rgba(232,114,42,.14)}
.profile-chip{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:14px;background:var(--card);
  border:1px solid var(--border);margin-top:10px;box-shadow:var(--shadow-sm)}
.avatar{width:30px;height:30px;border-radius:50%;flex:0 0 30px;display:grid;place-items:center;font-weight:700;font-size:13px;
  background:radial-gradient(circle at 38% 32%,var(--orb-a),var(--orb-b) 60%,var(--orb-c));color:#fff}
.profile-chip .nm{font-size:13.5px;font-weight:650;line-height:1.1}
.profile-chip .pl{font-size:11px;color:var(--subtle)}
.profile-chip .cv{margin-left:auto;color:var(--subtle)}

/* ─── Main ─── */
#main{flex:1;height:100%;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:14px;padding:18px 26px 4px}
#burger{display:none}
.status-pills{margin-left:auto;display:flex;gap:9px;align-items:center}
.spill{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;background:var(--card);
  border:1px solid var(--border);font-size:13px;color:var(--muted);font-weight:550;box-shadow:var(--shadow-sm)}
.spill .d{width:7px;height:7px;border-radius:50%;background:var(--primary)}
.theme-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:grid;place-items:center;font-size:16px;box-shadow:var(--shadow-sm);transition:.2s}
.theme-btn:hover{border-color:var(--primary);transform:rotate(12deg)}
#scrollarea{flex:1;overflow-y:auto;padding:8px 26px 60px;scroll-behavior:smooth}
/* ─── Motion system (spring-like, GPU-only transform/opacity) ───
   --ease-spring = a gentle overshoot for entrances; --ease-soft = calm settle.
   Honors prefers-reduced-motion below. */
:root{--ease-spring:cubic-bezier(.22,1.2,.36,1);--ease-soft:cubic-bezier(.25,.9,.3,1)}
.fade{animation:fade .42s var(--ease-spring) both}
@keyframes fade{from{opacity:0;transform:translateY(12px) scale(.992)}to{opacity:1;transform:none}}
/* staggered card entrance — add .rise to children, they cascade in.
   Set --i on each child (or rely on the JS that stamps it) for the delay step. */
.rise{animation:riseIn .5s var(--ease-spring) both;animation-delay:calc(var(--i,0) * 42ms)}
@keyframes riseIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
.pop{animation:popIn .34s var(--ease-spring) both}
@keyframes popIn{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
/* press feedback — universal for our buttons/tappables */
.btn,.vchip,.qa-card,.wtile,.wqbtn,.nav-i,.ico-btn,.card.tap,.spill,.theme-btn{will-change:transform}
.btn:active,.vchip:active,.qa-card:active,.wqbtn:active,.ico-btn:active,.card.tap:active,.spill:active{transform:translateY(1px) scale(.97);transition:transform .08s ease}
.wtile:active{transform:translateY(0) scale(.98)}
.nav-i:active{transform:scale(.98)}
/* smooth expand/collapse: grid-rows trick (animatable, no fixed height) */
.collapse{display:grid;grid-template-rows:0fr;transition:grid-template-rows .38s var(--ease-soft),opacity .3s ease;opacity:.4}
.collapse.open{grid-template-rows:1fr;opacity:1}
.collapse>.collapse-inner{overflow:hidden;min-height:0}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  .fade,.rise,.pop{animation:none}
}

/* ─── Home hero ─── */
.layout{display:grid;grid-template-columns:1fr 312px;gap:22px;align-items:start}
@media(max-width:1180px){.layout{grid-template-columns:1fr}.rail{display:none}}
.date{color:var(--subtle);font-size:13px;font-weight:600;margin:8px 0 6px}
.greet{display:flex;align-items:center;gap:12px;margin:0 0 4px}
.greet h1{margin:0;font-size:31px;font-weight:820;letter-spacing:0}
.wave{color:var(--primary);font-size:20px}
.subtle-line{color:var(--muted);font-size:14.5px;margin-bottom:18px;max-width:720px}
.maincol{position:relative}
.side-orb{display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:0 0 6px}
.side-orb .orb-scale{transform:scale(.58);transform-origin:center;margin:-32px 0 -26px}
.cloud{font-style:italic;font-size:13.5px;color:var(--muted);background:var(--card);border:1px solid var(--border);
  padding:3px 15px;border-radius:30px;box-shadow:var(--shadow-sm);position:relative;z-index:2}
.cloud::after{content:"";position:absolute;bottom:-5px;left:50%;margin-left:-4px;width:8px;height:8px;border-radius:50%;background:var(--card);border:1px solid var(--border)}
.orb{--eye:rgba(58,20,4,.72);width:150px;height:150px;border-radius:50%;position:relative;pointer-events:auto;cursor:pointer;
  background:radial-gradient(circle at 38% 30%,var(--orb-a),var(--orb-b) 42%,var(--orb-c) 78%,var(--orb-d));
  box-shadow:0 0 80px 14px var(--glow), inset -8px -12px 34px rgba(0,0,0,.38), inset 10px 12px 28px rgba(255,225,190,.45);
  animation:breathe 5s ease-in-out infinite;transition:transform .25s}
.orb::before{content:"";position:absolute;inset:-12px;border:1px dashed rgba(255,160,90,.28);border-radius:50%;opacity:0;animation:orbOrbit 6s linear infinite;transition:.25s}
.orb::after{content:"";position:absolute;top:26px;left:30px;width:38px;height:20px;border-radius:50%;background:rgba(255,245,225,.34);filter:blur(.3px);transform:rotate(-24deg)}
@keyframes orbOrbit{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.025)}}
.orb.morning{--orb-a:#FFF0C4;--orb-b:#FFB86A;--orb-c:#D96722;--orb-d:#552411}
.orb.evening{--orb-a:#FFD0A8;--orb-b:#F47B45;--orb-c:#933018;--orb-d:#35100A}
.orb.night{--orb-a:#D8AA73;--orb-b:#9E642F;--orb-c:#5B321B;--orb-d:#1B0E09;animation:breathe 7s ease-in-out infinite}
/* ── EYES ──────────────────────────────────────────────────────────────
   Default = AWAKE: big open expressive pupils with a soft catchlight + a
   natural idle blink. The closed sleepy arc is reserved for sleeping
   (rest/night) and squint-smile states only. */
.orb .eye{position:absolute;top:56px;width:26px;height:26px}
.orb .eye.left{left:34px}.orb .eye.right{right:34px}
/* closed = sleepy down-arc (hidden by default; only sleep/smile states show it) */
.orb .eye .closed{position:absolute;left:0;top:7px;width:26px;height:13px;border:3px solid var(--eye);
  border-top:0;border-left:0;border-right:0;border-radius:0 0 26px 26px;opacity:0;transition:.22s ease}
/* open = round, glossy pupil — the awake default */
.orb .eye .open{position:absolute;left:3px;top:0;width:20px;height:23px;border-radius:50%;
  background:radial-gradient(circle at 34% 30%,color-mix(in srgb,var(--eye) 70%,#fff),var(--eye) 62%);
  opacity:1;transform:scale(1);transform-origin:center;
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.25);
  transition:transform .18s ease,opacity .18s ease,border-radius .2s ease;
  animation:blink 5.4s ease-in-out infinite}
.orb .eye.right .open{animation-delay:.06s}
/* catchlight: little spark of life */
.orb .eye .open .shine{position:absolute;top:4px;left:5px;width:7px;height:7px;border-radius:50%;
  background:rgba(255,250,242,.92);filter:blur(.2px);transition:.18s}
.orb .eye .open .shine::after{content:"";position:absolute;bottom:-5px;right:-4px;width:3px;height:3px;
  border-radius:50%;background:rgba(255,250,242,.6)}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
/* MOUTH: default = a warm, ever-present smile (upward arc).
   Per-mood rules below reshape it (talk / o / line / grin / tiny). */
.orb .mouth{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);width:24px;height:12px;
  border:3px solid var(--eye);border-top:0;border-radius:0 0 24px 24px;opacity:.9;
  transition:width .25s ease,height .25s ease,border-radius .25s ease,opacity .25s ease,transform .25s ease}

/* peek (hover): a bright, awake startle — pupils widen + a quick pop */
.orb.peek{animation:startle .4s ease forwards}
@keyframes startle{0%{transform:scale(1)}45%{transform:scale(1.07) translateY(-3px)}100%{transform:scale(1.04)}}
.orb.peek .eye .open{transform:scale(1.18);animation:none}
.orb.peek .eye .open .shine{transform:scale(1.15)}

/* sad (mouse-leave): pupils shrink + look down, small frown (flip arc up) */
.orb.sad .eye .open{transform:scale(.78) translateY(4px);animation:none}
.orb.sad .mouth{opacity:1;width:18px;height:8px;border-top:3px solid var(--eye);border-bottom:0;border-radius:18px 18px 0 0;bottom:32px}

/* ── rich expressions (setOrbMood) ───────────────────────────────────── */
/* thinking: eyes glance up-left, gentle bob, soft line mouth + thought bubble "…" */
.orb.think .eye .open{transform:scale(.92) translate(-2px,-3px);animation:none}
.orb.think .eye .open .shine{top:2px}
.orb.think .mouth{opacity:.8;width:13px;height:0;border:0;border-top:3px solid var(--eye);border-radius:3px;bottom:38px}
.orb.think{animation:orbBob 1.3s ease-in-out infinite}
.orb.think .bubble{opacity:1}
@keyframes orbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* listening: wide alert eyes + small "o" mouth + pulsing aura ring */
.orb.listen .eye .open{transform:scale(1.2);animation:none}
.orb.listen .mouth{opacity:1;width:11px;height:11px;border:3px solid var(--eye);border-radius:50%;bottom:32px}
.orb.listen{animation:orbListen 1s ease-in-out infinite}.orb.listen::before{opacity:1;animation-duration:1.4s}
@keyframes orbListen{0%,100%{box-shadow:0 0 0 0 var(--glow)}50%{box-shadow:0 0 0 18px rgba(255,140,66,0)}}

/* organizing: focused narrowed eyes (slight squint), tidy flat mouth, glasses, orbit ring */
.orb.organize .eye .open{transform:scaleY(.62) scale(.96);border-radius:50% 50% 45% 45%;animation:none}
.orb.organize .mouth{opacity:1;width:18px;height:0;border:0;border-top:3px solid var(--eye);border-radius:3px;bottom:38px}
.orb.organize .glasses{opacity:1}
.orb.organize::before{opacity:1;animation-duration:2.2s}

/* saved: warm squint-smile (closed up-arcs) + grin */
.orb.save .eye .open{opacity:0}
.orb.save .eye .closed{opacity:1;border-radius:26px 26px 0 0;border-top:3px solid var(--eye);border-bottom:0;top:3px}
.orb.save .mouth{opacity:1;border-top:0;border-bottom:3px solid var(--eye);border-radius:0 0 22px 22px}

/* reading: eyes track down to "the page", subtle line mouth, reading glasses */
.orb.read .eye .open{transform:scaleY(.7) translateY(3px);animation:none}
.orb.read .eye .open .shine{top:2px}
.orb.read .mouth{opacity:.75;width:14px;height:0;border:0;border-top:3px solid var(--eye);border-radius:2px;bottom:38px}
.orb.read .glasses{opacity:1}

/* sleeping (rest / night): the ONLY fully-closed states — soft arcs + tiny mouth + zzz */
.orb.rest .eye .open,.orb.night .eye .open{opacity:0}
.orb.rest .eye .closed,.orb.night .eye .closed{opacity:1;border-radius:26px 26px 0 0;border-top:3px solid var(--eye);border-bottom:0;top:9px}
.orb.rest .mouth,.orb.night .mouth{opacity:1;width:9px;height:5px;border:0;border-bottom:3px solid var(--eye);border-radius:0 0 9px 9px;background:none;bottom:38px}
/* sleeping: breathing snore puff drifts from the mouth */
.orb.rest .snore,.orb.night .snore{opacity:1;animation:snorePuff 4s ease-in-out infinite}
.orb .snore{position:absolute;bottom:30px;left:50%;width:9px;height:9px;border-radius:50%;
  background:rgba(255,250,242,.5);opacity:0;pointer-events:none;transform:translateX(-50%)}
@keyframes snorePuff{0%,55%{opacity:0;transform:translate(-50%,2px) scale(.4)}70%{opacity:.6}100%{opacity:0;transform:translate(2px,-22px) scale(1.5)}}
/* floating zzz, drifting up — only while sleeping (now THREE staggered z's) */
.orb .zzz{position:absolute;top:24px;right:22px;font-size:13px;font-weight:800;font-style:italic;
  color:var(--eye);opacity:0;pointer-events:none;transition:.3s}
.orb.rest .zzz,.orb.night .zzz{opacity:.85;animation:zzzFloat 2.6s ease-in-out infinite}
.orb .zzz::before,.orb .zzz::after{content:"z";position:absolute;font-style:italic;font-weight:800}
.orb .zzz::before{font-size:10px;left:9px;top:-9px;opacity:.7}
.orb .zzz::after{font-size:8px;left:16px;top:-16px;opacity:.5}
@keyframes zzzFloat{0%{opacity:0;transform:translate(0,4px) scale(.7)}40%{opacity:.85}100%{opacity:0;transform:translate(9px,-16px) scale(1.12)}}

/* idle: explicit awake reset — calm, fully open, blinking (same as base) */
.orb.idle .eye .open{opacity:1;transform:scale(1)}
.orb.idle .eye .closed{opacity:0}

/* happy: bright open eyes + a big grin + a sparkle */
.orb.happy .eye .open{transform:scale(1.06);animation:none}
.orb.happy .mouth{opacity:1;border-top:0;border-bottom:3px solid var(--eye);border-radius:0 0 24px 24px;width:26px;height:14px}
.orb.happy .spark{opacity:1}

/* celebrate: sparkly squint-grin + sparkles + a double bounce */
.orb.celebrate .eye .open{opacity:0}
.orb.celebrate .eye .closed{opacity:1;border-radius:26px 26px 0 0;border-top:3px solid var(--eye);border-bottom:0;top:3px}
.orb.celebrate .mouth{opacity:1;border-top:0;border-bottom:3px solid var(--eye);border-radius:0 0 24px 24px;width:28px;height:15px}
.orb.celebrate .spark{opacity:1}
.orb.celebrate{animation:orbBounce .5s ease 2}
@keyframes orbBounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-12px)}60%{transform:translateY(-3px)}}

/* confused: one eye wide, one squinted, tilted mouth + a wobble */
.orb.confused .eye.left .open{transform:scale(1.12);animation:none}
.orb.confused .eye.right .open{transform:scaleY(.55) translateY(2px);border-radius:50% 50% 45% 45%;animation:none}
.orb.confused .mouth{opacity:1;transform:translateX(-50%) rotate(14deg)}
.orb.confused{animation:orbWobble .6s ease}
@keyframes orbWobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-4deg)}75%{transform:rotate(4deg)}}

/* ── PROPS (theme-safe pure-CSS shapes; hidden until a mood reveals them) ── */
/* reading glasses: two thin rounded lenses + bridge, sits over the eyes */
.orb .glasses{position:absolute;top:54px;left:50%;transform:translateX(-50%);width:74px;height:24px;opacity:0;pointer-events:none;transition:opacity .25s ease}
.orb .glasses .lens{position:absolute;top:0;width:26px;height:22px;border:2.5px solid var(--eye);border-radius:9px;background:rgba(255,250,242,.12)}
.orb .glasses .lens.l{left:2px}.orb .glasses .lens.r{right:2px}
.orb .glasses .bridge{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:14px;height:2.5px;background:var(--eye);border-radius:2px}
.orb .glasses .temple{position:absolute;top:6px;right:-7px;width:9px;height:2.5px;background:var(--eye);border-radius:2px;transform:rotate(-14deg)}

/* headphones: band over the top + a cup on each side */
.orb .cans{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .25s ease}
.orb .cans .band{position:absolute;top:-9px;left:6px;right:6px;height:62px;border:6px solid var(--eye);border-bottom:0;border-radius:70px 70px 0 0;opacity:.92}
.orb .cans .cup{position:absolute;top:56px;width:25px;height:44px;border-radius:11px;background:var(--eye);box-shadow:inset 0 0 0 3px rgba(255,250,242,.18)}
.orb .cans .cup.l{left:-10px}.orb .cans .cup.r{right:-10px}

/* floating musical notes (music mood) */
.orb .note{position:absolute;font-size:16px;font-weight:900;color:var(--eye);opacity:0;pointer-events:none;top:30px}
.orb .note.n1{right:6px}.orb .note.n2{right:-4px;font-size:13px}.orb .note.n3{left:4px}

/* thought bubble: rising dots + a small cloud with "…" (think mood) */
.orb .bubble{position:absolute;top:-6px;right:6px;opacity:0;pointer-events:none;transition:opacity .25s ease}
.orb .bubble span{position:absolute;background:var(--card,#fff);border:1.5px solid var(--eye);border-radius:50%}
.orb .bubble .b3{width:5px;height:5px;right:30px;top:40px}
.orb .bubble .b2{width:8px;height:8px;right:32px;top:28px}
.orb .bubble .b1{width:34px;height:22px;right:0;top:0;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:3px}
.orb .bubble .b1 i{width:4px;height:4px;border-radius:50%;background:var(--eye);animation:dotPulse 1.4s ease-in-out infinite}
.orb .bubble .b1 i:nth-child(2){animation-delay:.2s}.orb .bubble .b1 i:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}

/* sparkles (happy / celebrate) — 4-point stars via crossed gradients */
.orb .spark{position:absolute;width:12px;height:12px;opacity:0;pointer-events:none;
  background:radial-gradient(circle,rgba(255,250,242,.95) 1px,transparent 2px),
    linear-gradient(var(--eye),var(--eye)) center/2px 100% no-repeat,
    linear-gradient(90deg,var(--eye),var(--eye)) center/100% 2px no-repeat;
  filter:drop-shadow(0 0 4px var(--glow));animation:sparkPop 1.4s ease-in-out infinite}
.orb .spark.s1{top:14px;right:14px}
.orb .spark.s2{top:40px;left:8px;width:8px;height:8px;animation-delay:.45s}
.orb .spark.s3{bottom:24px;right:18px;width:9px;height:9px;animation-delay:.8s}
@keyframes sparkPop{0%,100%{opacity:0;transform:scale(.4) rotate(0)}50%{opacity:1;transform:scale(1) rotate(45deg)}}

/* ── music mood: headphones + notes + a happy talk-smile + a head-bob groove ── */
.orb.music .eye .open{transform:scale(1.04);animation:none}
.orb.music .mouth{opacity:1;border-top:0;border-bottom:3px solid var(--eye);border-radius:0 0 24px 24px;width:22px;height:12px}
.orb.music .cans{opacity:1}
.orb.music .note{opacity:1}
.orb.music .note.n1{animation:noteFloat 2.1s ease-in-out infinite}
.orb.music .note.n2{animation:noteFloat 2.6s ease-in-out infinite .5s}
.orb.music .note.n3{animation:noteFloat2 2.4s ease-in-out infinite .9s}
.orb.music{animation:orbGroove 1.1s ease-in-out infinite}
@keyframes orbGroove{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-4px)}}
@keyframes noteFloat{0%{opacity:0;transform:translate(0,6px) rotate(0) scale(.7)}30%{opacity:1}100%{opacity:0;transform:translate(10px,-26px) rotate(18deg) scale(1.1)}}
@keyframes noteFloat2{0%{opacity:0;transform:translate(0,6px) rotate(0) scale(.7)}30%{opacity:1}100%{opacity:0;transform:translate(-12px,-24px) rotate(-18deg) scale(1.1)}}

/* speaking: the default smile gently "talks" (open/close) while replying */
.orb.talk .mouth{opacity:1;animation:talkMouth .42s ease-in-out infinite}
@keyframes talkMouth{0%,100%{height:5px;border-radius:0 0 24px 24px}50%{height:13px;border-radius:0 0 14px 14px}}

/* ── PERSONA / COSTUMES (Lucy dresses for the section) ─────────────────────
   Pure-CSS props, theme-safe via --eye/--glow/--card/--primary. Each persona-*
   class on .orb reveals one costume; they layer on top of any mood/idle face.  */
.orb .costume{position:absolute;inset:0;pointer-events:none}
.orb .pp{position:absolute;opacity:0;transition:opacity .3s ease;pointer-events:none}

/* DOCTOR (health): stethoscope around the orb + red medical cross */
.orb.persona-doctor .pp-steth{opacity:1}
.orb .pp-steth .ear{position:absolute;top:6px;width:4px;height:18px;border-radius:3px;background:var(--eye)}
.orb .pp-steth .ear.l{left:40px;transform:rotate(20deg)}.orb .pp-steth .ear.r{right:40px;transform:rotate(-20deg)}
.orb .pp-steth .tube{position:absolute;top:14px;left:42px;right:42px;height:74px;border:4px solid var(--eye);border-top:0;border-radius:0 0 40px 40px;opacity:.92}
.orb .pp-steth .bell{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;background:var(--eye);box-shadow:inset 0 0 0 3px rgba(255,250,242,.25)}
.orb.persona-doctor .pp-cross{opacity:1}
.orb .pp-cross{top:18px;right:18px;width:18px;height:18px;border-radius:5px;background:#FF4D4D;box-shadow:0 0 10px rgba(255,77,77,.55)}
.orb .pp-cross::before,.orb .pp-cross::after{content:"";position:absolute;background:#fff;border-radius:1px}
.orb .pp-cross::before{top:4px;left:7.5px;width:3px;height:10px}.orb .pp-cross::after{left:4px;top:7.5px;width:10px;height:3px}

/* FINANCE (money): bow-tie + monocle + floating coins */
.orb.persona-finance .pp-bowtie,.orb.persona-finance .pp-monocle,.orb.persona-finance .pp-coin{opacity:1}
.orb .pp-bowtie{bottom:14px;left:50%;transform:translateX(-50%);width:30px;height:14px;
  background:var(--eye);clip-path:polygon(0 0,42% 50%,0 100%,100% 100%,58% 50%,100% 0);}
.orb .pp-bowtie::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:7px;height:9px;border-radius:2px;background:var(--orb-b)}
.orb .pp-monocle{top:52px;right:30px;width:24px;height:24px;border:3px solid var(--eye);border-radius:50%;background:rgba(255,250,242,.12)}
.orb .pp-monocle .chain{position:absolute;top:20px;right:6px;width:2px;height:22px;background:var(--eye);transform:rotate(12deg);border-radius:2px}
.orb .pp-coin{font-size:13px;font-weight:900;color:var(--eye);text-shadow:0 0 6px var(--glow)}
.orb.persona-finance .pp-coin.c1{top:18px;left:14px;animation:coinFloat 2.4s ease-in-out infinite}
.orb.persona-finance .pp-coin.c2{top:26px;right:10px;animation:coinFloat 2.8s ease-in-out infinite .6s}
@keyframes coinFloat{0%{opacity:0;transform:translateY(8px) scale(.7)}40%{opacity:1}100%{opacity:0;transform:translateY(-20px) scale(1.05)}}

/* SCHOLAR (brain): mortarboard cap + swinging tassel + a soft halo */
.orb.persona-scholar .pp-cap{opacity:1}
.orb .pp-cap{top:-12px;left:50%;transform:translateX(-50%);width:78px;height:30px}
.orb .pp-cap .base{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:40px;height:14px;border-radius:0 0 14px 14px;background:var(--eye)}
.orb .pp-cap .board{position:absolute;top:6px;left:50%;transform:translateX(-50%) rotate(0);width:78px;height:14px;border-radius:3px;background:var(--eye);box-shadow:0 3px 0 rgba(0,0,0,.18)}
.orb .pp-cap .tassel{position:absolute;top:12px;left:50%;width:2px;height:20px;background:var(--orb-a);transform-origin:top center;animation:tasselSwing 2.6s ease-in-out infinite}
.orb .pp-cap .tassel::after{content:"";position:absolute;bottom:-4px;left:-2px;width:6px;height:8px;border-radius:0 0 4px 4px;background:var(--orb-a)}
@keyframes tasselSwing{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-8deg)}}
.orb.persona-scholar::before{opacity:.9;animation-duration:8s}

/* PRODUCTIVITY (tasks): reading glasses (reuse) + pencil + tiny checklist */
.orb.persona-tasks .glasses{opacity:1}
.orb.persona-tasks .pp-pencil,.orb.persona-tasks .pp-list{opacity:1}
.orb .pp-pencil{top:30px;right:6px;width:5px;height:34px;background:var(--eye);border-radius:1px;transform:rotate(32deg)}
.orb .pp-pencil::before{content:"";position:absolute;top:-7px;left:0;border-left:2.5px solid transparent;border-right:2.5px solid transparent;border-bottom:7px solid var(--orb-a)}
.orb .pp-pencil::after{content:"";position:absolute;bottom:0;left:0;width:5px;height:3px;background:#FF4D4D;border-radius:0 0 1px 1px}
.orb .pp-list{top:24px;left:8px;width:20px;height:24px;border-radius:3px;background:var(--card,#fff);border:1.5px solid var(--eye);padding:3px;display:flex;flex-direction:column;justify-content:space-around}
.orb .pp-list i{height:2px;background:var(--eye);border-radius:2px;margin-left:5px;opacity:.7}
.orb .pp-list i:first-child{margin-left:0;width:3px;height:3px;border-radius:1px;background:var(--primary)}

/* PLANNER (calendar/productivity space): little calendar page */
.orb.persona-planner .pp-cal{opacity:1}
.orb .pp-cal{top:20px;right:12px;width:22px;height:22px;border-radius:4px;background:var(--card,#fff);border:1.5px solid var(--eye)}
.orb .pp-cal .hdr{position:absolute;top:0;left:0;right:0;height:6px;background:var(--primary);border-radius:3px 3px 0 0}
.orb .pp-cal::after{content:"";position:absolute;left:5px;bottom:4px;width:11px;height:2px;background:var(--eye);border-radius:2px;box-shadow:0 4px 0 var(--eye)}

/* PEOPLE: a friendly floating heart */
.orb.persona-people .pp-heart{opacity:1;animation:heartPulse 1.8s ease-in-out infinite}
.orb .pp-heart{top:16px;right:18px;width:14px;height:14px;background:#FF6B81;transform:rotate(-45deg);border-radius:0 0 3px 0}
.orb .pp-heart::before,.orb .pp-heart::after{content:"";position:absolute;width:14px;height:14px;background:#FF6B81;border-radius:50%}
.orb .pp-heart::before{top:-7px;left:0}.orb .pp-heart::after{top:0;right:-7px}
@keyframes heartPulse{0%,100%{transform:rotate(-45deg) scale(1);opacity:.85}50%{transform:rotate(-45deg) scale(1.18);opacity:1}}

/* TIMELINE: a memory film-strip shimmer */
.orb.persona-timeline .pp-film{opacity:1}
.orb .pp-film{top:20px;left:50%;transform:translateX(-50%);width:62px;height:14px;border-radius:3px;
  background:var(--eye);display:flex;align-items:center;justify-content:space-around;opacity:.9;overflow:hidden}
.orb .pp-film i{width:7px;height:7px;border-radius:1.5px;background:var(--card,#fff);opacity:.85;animation:filmShimmer 1.6s ease-in-out infinite}
.orb .pp-film i:nth-child(2){animation-delay:.2s}.orb .pp-film i:nth-child(3){animation-delay:.4s}.orb .pp-film i:nth-child(4){animation-delay:.6s}
@keyframes filmShimmer{0%,100%{opacity:.35}50%{opacity:1}}

.spark-dot{position:absolute;border-radius:50%;background:var(--primary-glow);opacity:.7;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:.9;transform:scale(1.1)}}

/* quick actions */
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
@media(max-width:640px){.qa{grid-template-columns:repeat(2,1fr)}}
.qa-card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;
  align-items:center;gap:12px;box-shadow:var(--shadow-sm);transition:.18s;text-align:left}
.qa-card:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:var(--shadow)}
.qa-ic{width:38px;height:38px;border-radius:11px;flex:0 0 38px;display:grid;place-items:center;font-size:17px;
  background:var(--primary-soft);color:var(--primary-deep)}
[data-theme="dark"] .qa-ic{color:var(--primary-glow)}
.qa-card .t{font-weight:650;font-size:14px}.qa-card .s{font-size:12px;color:var(--subtle)}

/* timeline */
.sec{margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.sec h2{margin:0;font-size:13px;font-weight:750;letter-spacing:.6px;text-transform:uppercase;color:var(--subtle)}
.sec .grow{flex:1}
.tl-item{display:flex;gap:16px;margin-bottom:4px}
.tl-time{flex:0 0 56px;text-align:right;color:var(--subtle);font-size:12px;padding-top:16px;position:relative}
.tl-time::after{content:"";position:absolute;right:-9px;top:20px;width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px var(--bg)}
.tl-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:13px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm);transition:.15s}
.tl-card:hover{border-color:var(--elevated)}
.tags{display:flex;gap:7px;align-items:center;margin-bottom:5px}
.tag{font-size:10px;font-weight:750;letter-spacing:.6px;text-transform:uppercase;padding:2px 8px;border-radius:6px;background:var(--tag-bg);color:var(--tag-text)}
.tag.kind{color:var(--primary-deep);background:var(--primary-soft)}
[data-theme="dark"] .tag.kind{color:var(--primary-glow)}
.tag.meeting{color:#60A5FA;background:rgba(96,165,250,.12)}
.tag.idea{color:#A78BFA;background:rgba(167,139,250,.14)}
.tag.project{color:#34D399;background:rgba(52,211,153,.14)}
.tl-card .ttl{font-weight:650;font-size:14.5px}
.tl-card .body{color:var(--subtle);font-size:13px;margin-top:3px;line-height:1.45}
.tl-card .more{color:var(--primary-deep);font-size:12px;font-weight:600;cursor:pointer;float:right;margin-top:2px}
[data-theme="dark"] .tl-card .more{color:var(--primary-glow)}
.tl-row{display:flex;align-items:flex-start;gap:8px}
.tl-actions{margin-left:auto;display:flex;gap:6px}

/* ─── Right rail ─── */
.rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:0}
.panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:var(--shadow-sm)}
.panel h3{margin:0 0 14px;font-size:14px;font-weight:700;display:flex;align-items:center}
.panel h3 .dots{margin-left:auto;color:var(--faint);cursor:pointer}
.focus-card{background:var(--primary-soft);border-radius:13px;padding:13px;display:flex;gap:11px;align-items:flex-start}
.focus-card .tm{font-size:12px;color:var(--primary-deep);font-weight:650}
.focus-card .fttl{font-weight:650;font-size:14px;margin-top:3px}
.focus-card .fsub{font-size:12px;color:var(--muted);margin-top:3px}
.focus-card .cal{margin-left:auto;font-size:18px}
.health{display:flex;align-items:center;gap:16px}
.ring{position:relative;width:74px;height:74px;flex:0 0 74px}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:grid;place-items:center;font-size:22px;font-weight:760}
.health .lbl .big{font-weight:700;font-size:15px}
.health .lbl .sm{font-size:12px;color:var(--subtle)}
.bars{display:flex;gap:4px;align-items:flex-end;height:38px;margin-left:auto}
.bars i{width:7px;background:var(--primary);border-radius:3px;opacity:.85;display:block}
.bars i.dim{background:var(--border);opacity:1}
.bars + .days{display:flex;gap:4px}
.mstat{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--divider)}
.mstat:last-child{border-bottom:0}
.mstat .mi{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:13px;background:var(--primary-soft);color:var(--primary-deep);flex:0 0 26px}
[data-theme="dark"] .mstat .mi{color:var(--primary-glow)}
.mstat .ml{font-size:13.5px;color:var(--muted)}
.mstat .mv{margin-left:auto;font-weight:750;font-size:15px}

/* ─── generic (other sections) ─── */
.grid{display:grid;gap:14px}
.stats{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow-sm)}
.stat .n{font-size:28px;font-weight:760;line-height:1}.stat .l{color:var(--subtle);font-size:12.5px;margin-top:6px}
.col{display:flex;flex-direction:column;gap:10px}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-top-color:color-mix(in srgb,var(--primary) 32%,var(--border));border-radius:18px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow-sm);transition:.15s}
.card:hover{border-color:var(--elevated)}
.card .ttl{font-weight:600;font-size:14.5px}.card .sub{color:var(--subtle);font-size:13px;margin-top:3px}
.card .when{color:var(--faint);font-size:11.5px;white-space:nowrap;margin-left:auto}
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--raised);color:var(--muted);text-transform:uppercase;white-space:nowrap}
.pill.high{background:rgba(251,113,133,.14);color:#FB7185}.pill.medium{background:rgba(245,158,11,.14);color:#F59E0B}.pill.low{background:rgba(74,222,128,.12);color:#4ADE80}
.pill.confirmed{background:rgba(74,222,128,.12);color:#4ADE80}.pill.supported{background:rgba(96,165,250,.12);color:#60A5FA}.pill.emerging{background:var(--raised);color:var(--subtle)}
.ico-btn{background:var(--raised);border:1px solid var(--border);color:var(--subtle);border-radius:9px;width:30px;height:30px;display:grid;place-items:center;font-size:14px;transition:.15s;flex:0 0 30px}
.ico-btn:hover{color:var(--text);border-color:var(--elevated)}.ico-btn.danger:hover{color:#FB7185;border-color:#FB7185}.ico-btn.good:hover{color:#4ADE80;border-color:#4ADE80}
.empty{text-align:center;color:var(--muted);padding:42px 22px;background:var(--card);border:1px solid var(--border);border-radius:20px}.empty .big{font-size:32px;opacity:.55;margin-bottom:10px}
.cat{font-size:11px;color:var(--primary-deep);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-right:7px}
[data-theme="dark"] .cat{color:var(--primary-glow)}
.btn{background:linear-gradient(180deg,var(--primary-glow),var(--primary-deep));color:var(--on-primary);border:none;border-radius:30px;padding:11px 18px;font-weight:700;font-size:14px;box-shadow:var(--shadow-sm);transition:.15s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}.btn.ghost{background:var(--raised);color:var(--muted);box-shadow:none;border:1px solid var(--border);font-weight:600}.btn.ghost:hover{color:var(--text)}.btn.sm{padding:7px 13px;font-size:12.5px}
.about-box{width:100%;background:var(--raised);border:1px solid var(--border);border-radius:14px;color:var(--text);padding:13px 15px;font-size:14px;font-family:inherit;resize:vertical;min-height:90px;outline:none}
.about-box:focus{border-color:var(--primary)}
.composer{display:flex;gap:10px;margin-bottom:18px}
.composer input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:30px;color:var(--text);padding:12px 18px;font-size:14px;outline:none;box-shadow:var(--shadow-sm)}
.composer input:focus{border-color:var(--primary)}

/* chat */
#chat{display:flex;flex-direction:column;height:calc(100vh - 130px);max-width:820px;margin:0 auto}
#stream{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:8px 4px 16px}
.msg{max-width:78%;padding:13px 17px;border-radius:18px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.msg.me{align-self:flex-end;background:linear-gradient(180deg,var(--primary-glow),var(--primary-deep));color:var(--on-primary);border-bottom-right-radius:5px;font-weight:500}
.msg.lucy{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:5px;box-shadow:var(--shadow-sm)}
.msg .srcs{margin-top:9px;padding-top:9px;border-top:1px solid var(--divider);font-size:12px;color:var(--subtle)}
.chip{display:inline-block;background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:12px;color:var(--muted);margin:3px 5px 0 0}
.typing{align-self:flex-start;display:flex;gap:5px;padding:15px 18px;background:var(--card);border:1px solid var(--border);border-radius:18px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--subtle);animation:blink 1.3s infinite}.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
#askbar{display:flex;gap:10px;padding:14px 4px 4px;border-top:1px solid var(--border-soft)}
#askbar textarea{flex:1;resize:none;background:var(--card);border:1px solid var(--border);border-radius:22px;color:var(--text);padding:12px 18px;font-size:14.5px;font-family:inherit;outline:none;max-height:120px;box-shadow:var(--shadow-sm)}
#askbar textarea:focus{border-color:var(--primary)}
.suggest{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.suggest button{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:8px 14px;font-size:13px}
.suggest button:hover{border-color:var(--primary);color:var(--text)}

@media(max-width:860px){
  #side{position:fixed;z-index:30;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 50px rgba(0,0,0,.5)}
  #side.open{transform:none}
  #burger{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:17px}
  #scrollarea{padding:8px 16px 60px}#topbar{padding:14px 16px 4px}.greet h1{font-size:25px}
}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:25}.scrim.on{display:block}
/* ─── Library / vault ─── */
.guardbar{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--subtle);margin:0 0 10px}
.guardbar:empty{display:none}
.guardbar.g-cap{color:var(--warning)}
.guardbar.g-on{color:var(--success)}
.guardbar .btn{margin-left:auto}
.vsearch{width:100%;background:var(--card);border:1px solid var(--border);border-radius:30px;color:var(--text);
  padding:13px 20px;font-size:15px;outline:none;box-shadow:var(--shadow-sm);margin:4px 0 14px}

.modal{display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:30px}

.modal-x{position:absolute;top:12px;right:12px;z-index:2;width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:15px}

.voice-fab{position:fixed;right:22px;bottom:22px;z-index:55;width:58px;height:58px;border-radius:50%;border:1px solid color-mix(in srgb,var(--primary) 42%,var(--border));background:linear-gradient(145deg,var(--primary),var(--primary-deep));color:var(--on-primary);box-shadow:0 16px 38px rgba(232,114,42,.34),var(--shadow-sm);display:grid;place-items:center;font-size:24px;cursor:pointer;transition:.18s}
.voice-fab:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 20px 48px rgba(232,114,42,.42),var(--shadow)}

.voice-fab-panel{position:fixed;right:22px;bottom:92px;z-index:54;width:min(380px,calc(100vw - 28px));background:color-mix(in srgb,var(--bg2) 92%,transparent);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:14px;display:none}
.voice-fab-panel.on{display:block;animation:panelIn .18s ease-out}

.voice-fab-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.voice-fab-orb{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 32% 24%,var(--primary-glow),var(--primary) 56%,var(--primary-deep));box-shadow:0 0 24px var(--glow);color:var(--on-primary);font-weight:900}
.voice-fab-title{font-size:14px;font-weight:780;color:var(--text)}
.voice-fab-sub{font-size:12px;color:var(--muted);line-height:1.35;margin-top:1px}
.voice-fab-log{max-height:220px;overflow:auto;display:flex;flex-direction:column;gap:8px;margin:10px 0}
.voice-msg{padding:9px 11px;border-radius:14px;font-size:13px;line-height:1.38;max-width:92%}
.voice-msg.user{align-self:flex-end;background:var(--primary-soft);color:var(--primary-deep)}
[data-theme="dark"] .voice-msg.user{color:var(--primary-glow)}
.voice-msg.lucy{align-self:flex-start;background:var(--card);border:1px solid var(--border);color:var(--text)}
.voice-fab-input{display:flex;gap:8px;align-items:flex-end}
.voice-fab-input textarea{flex:1;min-height:42px;max-height:100px;resize:none;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);padding:11px 12px;font-family:inherit;font-size:13.5px;outline:none}
.voice-fab-input textarea:focus{border-color:var(--primary)}
@media(max-width:680px){.voice-fab{right:16px;bottom:18px}.voice-fab-panel{right:14px;bottom:88px}}
.doc-detail{display:grid;grid-template-columns:1.4fr 1fr;max-height:88vh}
@media(max-width:680px){.doc-detail{grid-template-columns:1fr}}
.cap-detail{padding:24px 26px;max-width:680px}
.cap-detail .tags{margin-bottom:10px}
.cap-detail h3{margin:0 0 14px;font-size:20px;font-weight:740;line-height:1.3}
.cap-toggle{display:inline-flex;background:var(--raised);border:1px solid var(--border);border-radius:30px;padding:3px;margin-bottom:14px;gap:2px}
.cap-toggle button{background:none;border:none;color:var(--subtle);padding:7px 17px;border-radius:30px;font-size:13px;font-weight:600;transition:.15s}
.cap-toggle button.on{background:var(--primary);color:var(--on-primary)}
.cap-text{background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:16px;font-size:14px;line-height:1.62;white-space:pre-wrap;word-wrap:break-word;color:var(--text);min-height:80px;max-height:44vh;overflow-y:auto}

.dl-img{background:var(--sheet,#0c0a07);display:grid;place-items:start center;min-height:260px;max-height:88vh;overflow:auto}

.dl-side{padding:24px;display:flex;flex-direction:column;border-left:1px solid var(--border)}
.dl-bucket{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--primary-deep);margin-bottom:6px}
[data-theme="dark"] .dl-bucket{color:var(--primary-glow)}
.dl-title{margin:0 0 10px;font-size:19px;font-weight:740;line-height:1.25}
.dl-desc{color:var(--muted);font-size:13.5px;line-height:1.5;white-space:pre-wrap;overflow-y:auto;max-height:36vh}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:50;background:var(--elevated);border:1px solid var(--border);color:var(--text);padding:11px 20px;border-radius:30px;font-size:13.5px;opacity:0;transition:.25s;box-shadow:var(--shadow);pointer-events:none}

/* ─── Mood-over-time graph (Health) ─── */
.mood-graph-card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:16px 18px 14px;box-shadow:var(--shadow-sm)}
.mood-graph-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}

.mg-svg-wrap{position:relative;width:100%;overflow:visible}

.mw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}

.mw-sub .mw-meta{font-size:11.5px;color:var(--subtle);margin-top:2px}

.mw-sub .mw-amt b{font-size:14px;color:var(--primary);font-variant-numeric:tabular-nums}
.mw-sub .mw-amt span{display:block;font-size:11px;color:var(--faint);margin-top:1px}
.mw-line{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--divider);font-size:13px;color:var(--text);line-height:1.45}
.mw-line:last-child{border-bottom:0}
.mw-line .mw-bullet{flex:0 0 auto;color:var(--primary);font-weight:800}
.mw-up{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--divider);align-items:center;font-size:13px;color:var(--text)}
.mw-up:last-child{border-bottom:0}
.mw-up .mw-cal{flex:0 0 auto;font-size:15px;opacity:.85}

/* ─── Keep-warm (People) ─── */
.kw-card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-left:3px solid #FF6B81;border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow-sm)}
.kw-card .kw-av{width:38px;height:38px;border-radius:50%;flex:0 0 38px;display:grid;place-items:center;font-weight:700;font-size:15px;background:radial-gradient(circle at 36% 30%,#FFB1BF,#FF6B81 62%,#C2415A);color:#fff}
.kw-card .kw-b{flex:1;min-width:0}
.kw-card .kw-nm{font-weight:650;font-size:14.5px;display:flex;align-items:center;gap:8px}
.kw-card .kw-days{font-size:11px;font-weight:700;color:#FB7185;background:rgba(251,113,133,.13);padding:1px 8px;border-radius:20px}
.kw-card .kw-msg{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}

/* ─── Shape-your-day editor (energy curves) ─── */
.sd-card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:var(--shadow-sm)}
.sd-card h2{margin:0 0 4px;font-size:16px;font-weight:780}
.sd-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px;margin:14px 0 4px}
.sd-fld label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.sd-fld input[type=time]{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:11px;color:var(--text);padding:9px 11px;font:inherit;outline:none}
.sd-fld input[type=time]:focus{border-color:var(--primary)}
.sd-days{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 4px}
.sd-day{width:38px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--subtle);font-size:12px;font-weight:700;transition:.15s}
.sd-day.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-deep)}
[data-theme="dark"] .sd-day.on{color:var(--primary-glow)}
.sd-seg{display:inline-flex;background:var(--raised);border:1px solid var(--border);border-radius:30px;padding:3px;gap:2px;margin:4px 0 2px}
.sd-seg button{background:none;border:none;color:var(--subtle);padding:7px 15px;border-radius:30px;font-size:12.5px;font-weight:650;transition:.18s;display:flex;align-items:center;gap:6px}
.sd-seg button.on{color:var(--on-primary)}
.sd-seg button.on.brain{background:#A78BFA}
.sd-seg button.on.muscle{background:#FB7185}
.sd-seg button.on.attention{background:#2DD4BF}
.sd-curve-wrap{position:relative;margin-top:12px;background:var(--bg2);border:1px solid var(--border-soft);border-radius:14px;padding:10px 8px 4px}
.sd-curve{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair;user-select:none}
.sd-curve-hint{font-size:11.5px;color:var(--subtle);margin-top:6px;text-align:center}
.sd-bar{transition:height .12s ease,y .12s ease,fill .15s ease}
.sd-grid-ln{stroke:var(--border-soft);stroke-width:1}
.sd-hr-lbl{font-size:8.5px;fill:var(--faint)}
.sd-sleep-band{fill:var(--raised);opacity:.55}
.sd-actions{display:flex;gap:10px;align-items:center;margin-top:16px}
.sd-empty-sched{color:var(--subtle);font-size:12.5px}
</style>
</head>
<body>
<div id="shell">
  <aside id="side">
    <div class="brand"><span class="logo">LUC<span style="position:relative">Y<span class="spark" style="position:absolute;top:-6px;right:-10px">✦</span></span></span></div>
    <nav id="nav"></nav>
    <div class="side-spacer"></div>
    <div class="side-orb">
      <div class="cloud" id="orbCloud">Lucy</div>
      <div class="orb-scale"><div class="orb" id="orb" onmouseenter="orbPeek()" onmouseleave="orbLeave()">
        <div class="eye left"><span class="closed"></span><span class="open"><i class="shine"></i></span></div>
        <div class="eye right"><span class="closed"></span><span class="open"><i class="shine"></i></span></div>
        <div class="mouth"></div>
        <!-- props (pure CSS shapes, theme-safe; revealed per mood) -->
        <div class="glasses"><span class="lens l"></span><span class="bridge"></span><span class="lens r"></span><span class="temple"></span></div>
        <div class="cans"><span class="band"></span><span class="cup l"></span><span class="cup r"></span></div>
        <span class="note n1">♪</span><span class="note n2">♫</span><span class="note n3">♪</span>
        <div class="bubble"><span class="b3"></span><span class="b2"></span><span class="b1"><i></i><i></i><i></i></span></div>
        <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span>
        <span class="snore"></span>
        <span class="zzz">z</span>
        <!-- ── PERSONA / COSTUME LAYER (Lucy dresses for the section) ──
             Separate DOM + .pp-* classes so mood/idle class-clearing never strips the costume. -->
        <div class="costume">
          <!-- doctor (health): stethoscope + a red medical cross badge -->
          <span class="pp pp-steth"><i class="tube"></i><i class="bell"></i><i class="ear l"></i><i class="ear r"></i></span>
          <span class="pp pp-cross"></span>
          <!-- finance (money): bow-tie + monocle + floating coins -->

          <!-- scholar (brain): mortarboard cap + tassel -->
          <span class="pp pp-cap"><i class="board"></i><i class="base"></i><i class="tassel"></i></span>
          <!-- productivity (tasks): pencil + a tiny checklist card -->
          <span class="pp pp-pencil"></span>
          <span class="pp pp-list"><i></i><i></i><i></i></span>

          <span class="pp pp-cal"><i class="hdr"></i></span>
          <!-- people: a friendly floating heart -->
          <span class="pp pp-heart"></span>
          <!-- timeline: a memory shimmer / film strip -->
          <span class="pp pp-film"><i></i><i></i><i></i><i></i></span>
        </div>
      </div></div>
    </div>
    <div class="profile-chip"><div class="avatar" id="pavatar">V</div><div><div class="nm" id="pname">You</div><div class="pl">Pro Plan</div></div><span class="cv">⌄</span></div>
  </aside>
  <div class="scrim" id="scrim" onclick="toggleSide(false)"></div>
  <div id="main">
    <div id="topbar">
      <button id="burger" onclick="toggleSide(true)">☰</button>
      <div class="status-pills">
        <div class="spill"><span class="d"></span>Meeting</div>
        <div class="spill"><span class="d"></span>Listen</div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Day / Night">🌙</button>
      </div>
    </div>
    <div id="scrollarea"><div class="empty"><div class="big">◌</div>Loading your memory…</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal-card"><button class="modal-x" onclick="closeModal()">✕</button><div class="modal-body" id="modalBody"></div></div></div>
<section class="voice-fab-panel" id="voiceFabPanel" aria-live="polite">
  <div class="voice-fab-head">
    <div class="voice-fab-orb">L</div>
    <div><div class="voice-fab-title">Talk to Lucy</div><div class="voice-fab-sub">Type the same thing you would say out loud.</div></div>
    <span class="grow"></span><button class="ico-btn" onclick="go('ask');toggleVoiceFab(false)" title="Open Ask Lucy">↗</button>
  </div>

    <textarea id="voiceFabInput" rows="1" placeholder="Schedule, remember, ask..." oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();voiceFabSend();}"></textarea>
    <button class="btn" onclick="voiceFabSend()">Send</button>
  </div>
</section>
<button class="voice-fab" id="voiceFabBtn" onclick="toggleVoiceFab()" title="Talk to Lucy">💬</button>
<input type="file" id="fileInput" accept="image/*,application/pdf" multiple style="display:none" onchange="handleFiles(this.files);this.value='';"/>
<input type="file" id="importInput" accept="application/json,.json" style="display:none" onchange="handleImport(this.files&&this.files[0]);this.value='';"/>
<script>
let DATA=null, ROUTE='home', CHAT=[], busy=false, VOICEFAB=[];
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
  // LUCY reacts: ✓ → happy, errors → confused.
  if(/✓|done|saved|scheduled|added|captured/i.test(m))setOrbMood('happy',1800);
  else if(/could not|fail|unreach|not allowed|no (free|conflict|matches)|error/i.test(m))setOrbMood('confused',1800);}
let _orbMoodT=null;const ORB_MOODS=['peek','sad','think','listen','happy','celebrate','confused'];
function setOrbMood(m,hold){const o=$('orb');if(!o)return;ORB_MOODS.forEach(x=>o.classList.remove(x));if(m)o.classList.add(m);
  const c=$('orbCloud');if(c){const txt={think:'thinking…',listen:'listening…',happy:'nice!',celebrate:'woohoo!',confused:'hmm?'}[m];if(txt)c.textContent=txt;}
  if(_orbMoodT)clearTimeout(_orbMoodT);if(hold)_orbMoodT=setTimeout(()=>{o.classList.remove(m);},hold);}
const ORB_MOODS_V2=['idle','peek','sad','think','listen','organize','save','read','rest','happy','celebrate','confused','music','talk'];
function orbPhase(){const h=new Date().getHours();return h>=22||h<6?'night':h<11?'morning':h>=18?'evening':'day';}
function applyOrbAmbient(){const o=$('orb');if(!o)return;['morning','evening','night'].forEach(x=>o.classList.remove(x));const p=orbPhase();if(p!=='day')o.classList.add(p);
  if(p==='night'){stopOrbIdleCycle();}                          // night = sleeping, no cycle
  else if(!_orbActive&&!_orbIdleT){startOrbIdleCycle();}        // day & idle → keep her alive
  // don't clobber the cloud while a real mood OR the idle cycle is driving it
  const c=$('orbCloud');if(c&&!_orbActive&&!_orbIdleT)c.textContent=p==='night'?'resting':(typeof _orbPersonaName!=='undefined'?_orbPersonaName:'Lucy');}
const ORB_CLOUD_TXT={idle:'Lucy',think:'thinking...',listen:'listening...',organize:'organizing',save:'saved',read:'reading',rest:'resting',happy:'nice',celebrate:'woohoo',confused:'hmm?',music:'vibing',talk:'mm-hmm'};
/* setOrbMood = a REAL mood from a call site. It pauses the ambient idle cycle,
   shows the expression, and (if hold given) auto-returns to idle/ambient after. */
setOrbMood=function(m,hold){const o=$('orb');if(!o)return;
  stopOrbIdleCycle();                                   // a real mood always wins + pauses idle
  ORB_MOODS_V2.forEach(x=>o.classList.remove(x));if(m)o.classList.add(m);
  const c=$('orbCloud');if(c){const txt=ORB_CLOUD_TXT[m];if(txt)c.textContent=txt;}
  if(_orbMoodT)clearTimeout(_orbMoodT);_orbMoodT=null;
  // _orbActive = a real mood is on screen now (timed OR persistent) → idle cycle stays paused
  _orbActive = !!m;
  if(m&&hold)_orbMoodT=setTimeout(()=>{o.classList.remove(m);_orbMoodT=null;_orbActive=false;applyOrbAmbient();startOrbIdleCycle();},hold);
  else if(!m){_orbActive=false;applyOrbAmbient();startOrbIdleCycle();}}; // explicit clear → resume idle
/* ── AMBIENT IDLE CYCLE ───────────────────────────────────────────────────
   When idle (no real mood, not night), Lucy gently rotates through a few quiet
   expressions every ~5s so she feels alive. A real setOrbMood() override pauses
   it instantly; returning to idle (mood cleared / hold expired) resumes it.    */
let _orbIdleT=null,_orbIdleStep=0,_orbActive=false;
const ORB_IDLE_SEQ=[
  {m:'idle',cloud:'Lucy'},
  {m:'read',cloud:'reading'},
  {m:'think',cloud:'a thought…'},
  {m:'music',cloud:'humming'},
  {m:'happy',cloud:'☼'}          // calm + sparkle beat

function orbIdleTick(){const o=$('orb');if(!o)return;

/* ONE timestamp parser for the whole app. Accepts ms-epoch numbers (calendar blocks) AND DATETIME
   strings from SQLite ("YYYY-MM-DD HH:MM:SS", stored UTC, no zone) or ISO strings. The old code had
   two clashing clock() definitions + several places that parsed SQLite strings as LOCAL time — the
   "mixed created_at formats" bug (times off by the UTC offset, or Invalid Date in Safari). */
function parseTs(v){if(v==null||v==='')return NaN;if(typeof v==='number')return v;const s=(''+v).trim();if(/^\d{10,}$/.test(s))return +s;const hasTz=/[zZ]$|[+-]\d\d:?\d\d$/.test(s);return new Date(s.replace(' ','T')+(hasTz?'':'Z')).getTime();}
function clock(v){const t=parseTs(v);if(isNaN(t))return'';return new Date(t).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function fmt(v){const t=parseTs(v);if(isNaN(t))return'';const s=(Date.now()-t)/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';if(s<604800)return Math.floor(s/86400)+'d ago';return new Date(t).toLocaleDateString(undefined,{month:'short',day:'numeric'});}

/* Clean body: pull the Summary value from structured_text, skipping Title:/Type: labels
   (mirrors the app). Handles old "Title:/Summary:/…" rows + the new title-less format. */
function capBody(c){const st=c.structured_text;
  if(st){const lines=st.split('\n');
    for(const ln of lines){const i=ln.indexOf(':');if(i<0)continue;const lbl=ln.slice(0,i).trim().toLowerCase();if(lbl==='summary'){const v=ln.slice(i+1).trim();if(v)return v;}}
    for(const ln of lines){const i=ln.indexOf(':');if(i<0){if(ln.trim().length>15)return ln.trim();continue;}const lbl=ln.slice(0,i).trim().toLowerCase();if(lbl==='title'||lbl==='type')continue;const v=ln.slice(i+1).trim();if(v.length>15)return v;}}
  return (c.raw_transcript||'');}

function computeHealth(){const m=(DATA.mood_entries||[]);const recent=m.slice(0,40);
  const score=recent.length?Math.round(100*recent.filter(x=>x.tone==='positive').length/recent.length*.7+ (recent.filter(x=>x.tone!=='negative'&&x.tone!=='low').length/recent.length)*30):72;
  const s=Math.max(20,Math.min(99,score||72));
  const label=s>=80?'Great':s>=60?'Good':s>=40?'Okay':'Low';
  const bars=[];const byDay={};const now=new Date();
  for(let i=6;i>=0;i--){const day=new Date(now);day.setDate(now.getDate()-i);const key=day.toDateString();byDay[key]=0;}
  m.forEach(x=>{const ts=parseTs(x.created_at);if(isNaN(ts))return;const k=new Date(ts).toDateString();if(k in byDay)byDay[k]+= (x.tone==='positive'?3:x.tone==='neutral'?2:1);});
  const vals=Object.values(byDay);const mx=Math.max(1,...vals);Object.values(byDay).forEach(v=>bars.push(Math.round(v/mx*100)));
  return {score:s,label,note:s>=60?'Keep going strong':'Be kind to yourself',bars};}
function ring(score){const c=2*Math.PI*30;const off=c*(1-score/100);return `<div class="ring"><svg width="74" height="74"><circle cx="37" cy="37" r="30" fill="none" stroke="var(--divider)" stroke-width="7"/><circle cx="37" cy="37" r="30" fill="none" stroke="var(--primary)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg><div class="val">${score}</div></div>`;}
function barsHtml(bars){const days=['M','T','W','T','F','S','S'];return `<div class="bars">${bars.map((b,i)=>`<i class="${b<8?'dim':''}" style="height:${Math.max(8,b*.38)}px" title="${days[i]}"></i>`).join('')}</div>`;}

/* Map valence (−2..+2) → y inside the plot band. baseline (0) sits at mid. */
function moodGraphBody(){
  if(!MOODG_FETCHED&&!MOODG)return `<div class="mood-graph-card"><div class="hl-skel" style="height:120px"></div></div>`;
  if(!MOODG||!MOODG.hasData)return empty('〰','No mood trend yet','Tap how you feel a few times and Lucy will chart the drift.');
  const series=(MOODG.series||[]).filter(p=>p&&p.dayMs);
  if(!series.length)return empty('〰','No mood trend yet','Tap how you feel a few times and Lucy will chart the drift.');
  const shift=MOODG.shift||{};
  const dir=shift.direction||'flat';
  const arrow=dir==='up'?'↑':dir==='down'?'↓':'→';
  const shiftEl=(dir!=='flat'&&shift.message)?`<span class="mg-shift ${dir==='up'?'up':'down'}">${arrow} ${esc(shift.message)}</span>`:'';
  const cap=(dir==='flat'&&shift.message)?esc(shift.message):'Daily feeling, teal above the line, rose below.';
  // ── geometry ──
  const W=560,H=190,padL=26,padR=14,padT=14,padB=26;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const minV=-2,maxV=2;const mid=padT+plotH/2; // valence 0
  const yFor=v=>padT+plotH*(1-(v-minV)/(maxV-minV));
  const n=series.length;
  const xFor=i=>n<=1?padL+plotW/2:padL+plotW*(i/(n-1));
  // points with real scores (gaps = null)
  const pts=series.map((p,i)=>({i,x:xFor(i),v:(p.score==null?null:Math.max(minV,Math.min(maxV,p.score))),dayMs:p.dayMs,date:p.date,count:p.count,tone:p.dominantTone}));
  if(!pts.some(p=>p.v!=null))return empty('〰','No mood trend yet','Tap how you feel a few times and Lucy will chart the drift.');
  // Build path segments that BREAK on null (so gaps are real gaps, not zero).
  let segs=[],cur=[];
  pts.forEach(p=>{if(p.v==null){if(cur.length>1)segs.push(cur);cur=[];}else cur.push(p);});
  if(cur.length>1)segs.push(cur);
  const teal='#2DD4BF',rose='#FB7185';
  // line color: split stroke per segment by its mean sign (calm: rose when the stretch ran low)
  const linePaths=segs.map(seg=>{const d=seg.map((p,k)=>(k?'L':'M')+p.x.toFixed(1)+' '+yFor(p.v).toFixed(1)).join(' ');const mean=seg.reduce((s,p)=>s+p.v,0)/seg.length;return `<path class="mg-line" d="${d}" stroke="${mean<0?rose:teal}"/>`;});
  // area fill to baseline per segment
  const areaPaths=segs.map(seg=>{if(seg.length<2)return '';const mean=seg.reduce((s,p)=>s+p.v,0)/seg.length;const col=mean<0?rose:teal;const top=seg.map((p,k)=>(k?'L':'M')+p.x.toFixed(1)+' '+yFor(p.v).toFixed(1)).join(' ');const d=`${top} L ${seg[seg.length-1].x.toFixed(1)} ${mid.toFixed(1)} L ${seg[0].x.toFixed(1)} ${mid.toFixed(1)} Z`;return `<path d="${d}" fill="${col}" opacity=".10"/>`;});
  // dots (only real scores)
  const dots=pts.filter(p=>p.v!=null).map(p=>{const sel=MOODG_DAY&&MOODG_DAY.dayMs===p.dayMs?' sel':'';const col=p.v<0?rose:p.v>0?teal:'var(--muted)';return `<circle class="mg-dot${sel}" cx="${p.x.toFixed(1)}" cy="${yFor(p.v).toFixed(1)}" r="${sel?6.5:4}" fill="${col}" stroke="var(--card)" stroke-width="1.5" onclick="moodGraphPick(${p.dayMs})" style="cursor:pointer"><title>${esc(p.date||'')} · ${p.v>0?'+':''}${(+p.v).toFixed(1)}</title></circle>`;});
  // sparse x labels (first, middle, last)
  const labelIdx=n<=1?[0]:[0,Math.floor((n-1)/2),n-1];
  const xLabels=[...new Set(labelIdx)].map(i=>{const p=pts[i];if(!p)return '';const dt=p.date?new Date(p.dayMs):null;const lab=dt?dt.toLocaleDateString(undefined,{month:'short',day:'numeric'}):'';return `<text class="mg-day-label" x="${p.x.toFixed(1)}" y="${(H-7)}" text-anchor="${i===0?'start':i===n-1?'end':'middle'}">${lab}</text>`;}).join('');
  const svg=`<div class="mg-svg-wrap"><svg class="mg-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <line x1="${padL}" y1="${mid}" x2="${W-padR}" y2="${mid}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>
    <text class="mg-axis" x="${padL-4}" y="${padT+4}" text-anchor="end">good</text>

}

const SYN=[['payslip','payslips','salary','salaries','salaryslip','wage','wages','paystub','paystubs','paycheck','paychecks','payroll','payrolls','earnings','earning','remuneration','compensation','stub','stubs'],

  ['uk','united kingdom','britain','british','england'],
  ['id','identity','identification','card','cards','license','licence','permit','aadhaar','aadhar','ssn','pan','dl'],
  ['certificate','certificates','cert','certification','degree','diploma','transcript','transcripts','marksheet','marksheets'],
  ['invoice','invoices','bill','bills','receipt','receipts'],
  ['statement','statements','bankstatement','bank statement'],
  ['visa','visas','i-20','i20','immigration','ead','opt','sevis'],['passport','passports'],
  ['tax','taxes','taxation','w2','w-2','1099','1040','itr','return','returns','tds','form16'],
  ['insurance','policy','policies'],
  ['offer','offerletter','employment','appointment','contract'],
  ['vaakruthi','vaakkruthi','vaakruth'],['nokia']];
/* Filler words that just mean "documents" or are noise — ignored so "usa docs" === "usa". */
const STOP=new Set(['doc','docs','document','documents','file','files','my','all','the','a','an','of','for','in','on','show','find','get','me','please','related','about','any','some']);
/* Negation words: everything after them (or a "-term") is EXCLUDED. */
const NEG=new Set(['ignore','except','exclude','excluding','without','not','no','minus','but']);
function expand(tok){for(const g of SYN){if(g.includes(tok))return g;}return tok.length>4&&tok.endsWith('s')?[tok,tok.slice(0,-1)]:[tok];}
/* Parse "india docs - ignore payslips" → {pos:['india'], neg:['payslips']}. */
function parseQuery(q){const toks=q.toLowerCase().replace(/,/g,' ').split(/\s+/).filter(Boolean);
  const pos=[],neg=[];let mode='pos';
  for(const t of toks){
    if(t==='-')continue;
    if(t.startsWith('-')&&t.length>1){neg.push(t.slice(1));continue;}
    if(NEG.has(t)){mode='neg';continue;}
    if(STOP.has(t))continue;
    (mode==='pos'?pos:neg).push(t);
  }
  return {pos,neg};}
/* Whole-word match so short tokens (us, id, ind) don't match inside "status"/"video". */
/* Bounded Levenshtein (early-out past tolerance) — for fuzzy name/OCR matching. */
function levLE(a,b,max){const la=a.length,lb=b.length;if(Math.abs(la-lb)>max)return false;let prev=Array.from({length:lb+1},(_,i)=>i);for(let i=1;i<=la;i++){const cur=[i];let best=i;for(let j=1;j<=lb;j++){const cost=a[i-1]===b[j-1]?0:1;const v=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+cost);cur[j]=v;if(v<best)best=v;}if(best>max)return false;prev=cur;}return prev[lb]<=max;}
function hit(hay,s){if(new RegExp('\\b'+s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(hay))return true;
  // Fuzzy fallback for longer tokens so OCR/spelling variants still match (e.g. "vaakruthi" vs
  // "vakruthi"). Short tokens are left exact — fuzzing them yields too many false hits.
  if(s.length<5)return false;const tol=s.length>=8?2:1;
  return hay.split(/[^a-z0-9]+/).some(w=>w.length>=4&&levLE(w,s,tol));}
function smartMatch(item,q){const hay=((item.title||'')+' '+(item.description||'')+' '+(item.bucket||'')+' '+(item.keywords||'')).toLowerCase();
  const {pos,neg}=parseQuery(q);
  if(neg.some(t=>expand(t).some(s=>hit(hay,s))))return false; // an excluded term is present
  if(!pos.length)return true; // only filler/negation → show the rest
  return pos.every(t=>expand(t).some(s=>hit(hay,s)));}

    <div class="tags"><span class="tag kind">${esc(c.capture_kind||'thought')}</span>${tagFor(c)}<span style="margin-left:auto;color:var(--faint);font-size:11.5px">${fmt(c.created_at)}</span></div>

    <div class="cap-toggle"><button class="${capView==='summary'?'on':''}" onclick="capView='summary';renderCapDetail()">Summary</button><button class="${capView==='raw'?'on':''}" onclick="capView='raw';renderCapDetail()">Raw idea</button></div>
    <div class="cap-text" id="capText">${esc(text)}</div>
    <div class="cap-actions">
      <button class="btn sm" onclick="copyCap()">⧉ Copy ${capView==='raw'?'raw':'summary'}</button>
      <button class="btn ghost sm" onclick="askAboutCap()">✦ Ask Lucy</button>
      <button class="btn ghost sm" onclick="capEditing=true;renderCapDetail()">✎ Correct</button>
      <button class="btn ghost sm" onclick="reprocessCap(${c.id})">↻ Reprocess</button>
      <div class="grow" style="flex:1"></div>
      <button class="btn ghost sm dl-del" onclick="delCaptureModal(${c.id})">Delete</button>
    </div></div>`;}
async function copyCap(){const t=capView==='summary'?(capBody(capCur)||''):(capCur.raw_transcript||'');try{await navigator.clipboard.writeText(t);toast('Copied ✓');}catch(e){toast('Copy not allowed by browser');}}
function askAboutCap(){const c=capCur;closeModal();go('ask');setTimeout(()=>{const q=$('q');if(q){q.value='About this note — "'+capText(c)+'": ';q.focus();autoGrow(q);}},120);}
async function reprocessCap(id){toast('Reprocessing…');try{await api('/api/capture/reprocess',{method:'POST',body:JSON.stringify({id})});toast('Reprocessing — updating shortly');}catch(e){toast('Reprocess needs the latest update');}closeModal();setTimeout(()=>load(),3000);}
async function saveCorrect(id){const t=$('capEdit').value;if(!t.trim())return;toast('Saving & reprocessing…');try{await api('/api/capture/correct',{method:'POST',body:JSON.stringify({id,text:t})});toast('Corrected — re-extracting');}catch(e){toast('Correct needs the latest update');}capEditing=false;closeModal();setTimeout(()=>load(),3000);}
async function delCaptureModal(id){await api('/api/capture/'+id,{method:'DELETE'});toast('Deleted');closeModal();await load();}
async function refile(id){const b=$('dlBucket').value;await api('/api/vault/refile',{method:'POST',body:JSON.stringify({id,bucket:b})});toast('Re-filed → '+b);closeModal();await loadVault();}
async function addCustomBucket(id){const name=prompt('New bucket name (e.g. House papers):');if(!name||!name.trim())return;await api('/api/vault/refile',{method:'POST',body:JSON.stringify({id,bucket:name.trim()})});toast('Filed → '+name.trim());closeModal();await loadVault();}
async function deleteDoc(id){await api('/api/vault/'+id,{method:'DELETE'});toast('Deleted');closeModal();await loadVault();}
async function addTask(){const i=$('ntask');const v=i.value.trim();if(!v)return;i.value='';await api('/api/task',{method:'POST',body:JSON.stringify({action:'create',task:v})});toast('Task added ✓');await load();}
async function task(id,action){await api('/api/task',{method:'POST',body:JSON.stringify({id,action})});toast(action==='complete'?'Done ✓':'Deleted');await load();}
async function delCapture(id){await api('/api/capture/'+id,{method:'DELETE'});toast('Deleted');await load();}
async function delFact(id){await api('/api/fact/'+id,{method:'DELETE'});toast('Removed');await load();}
async function logMood(tone){await api('/api/mood',{method:'POST',body:JSON.stringify({tone})});toast('Mood logged ♥');await load();}
async function saveAbout(){const v=$('aboutbox').value;await api('/api/profile',{method:'POST',body:JSON.stringify({about:v})});toast('Saved ✓');await load(true);}
async function sendFeedback(){const i=$('fb');const v=i.value.trim();if(!v)return;i.value='';await api('/api/feedback',{method:'POST',body:JSON.stringify({text:v})});toast('LUCY learned it ✓');await load();}
async function reflect(){const b=$('reflectBtn');if(b){b.textContent='Reflecting…';b.disabled=true;}try{const r=await api('/api/reflect',{method:'POST',body:'{}'});const n=(r&&r.learned)||0;toast(n>0?('Learned '+n+' new thing'+(n===1?'':'s')+' ✓'):'Nothing new to learn right now');}catch(e){toast('Reflection failed');}await load();}

/* Desktop alerts: while the dashboard is open on the laptop, pop a browser notification for any NEW
   LUCY notification on the phone — so the user gets nudged at their desk without touching the phone.
   No backend/push needed: we poll /api/notifications over the LAN and use the browser Notification API.
   (Works while this tab is open; true closed-tab web push would need a push server.) */
let _notifSeen = Number(localStorage.getItem('lucyNotifSeen')||'0');
let _notifPollT=null;
async function pollDesktopNotifs(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  try{
    const r=await api('/api/notifications'); const items=(r&&r.items)||[];
    const ids=items.map(x=>Number(x.id)||0);
    const maxId=ids.length?Math.max(...ids):0;
    if(_notifSeen===0){ _notifSeen=maxId; localStorage.setItem('lucyNotifSeen',String(maxId)); return; } // seed, don't blast old
    const fresh=items.filter(x=>(Number(x.id)||0)>_notifSeen).sort((a,b)=>(a.id-b.id));
    for(const n of fresh.slice(-5)){
      try{ const note=new Notification((n.title||'LUCY'),{body:(n.body||n.message||''),icon:'',tag:'lucy-'+n.id}); note.onclick=()=>window.focus(); }catch(e){}
    }
    if(maxId>_notifSeen){ _notifSeen=maxId; localStorage.setItem('lucyNotifSeen',String(maxId)); }
  }catch(e){}
}
function startNotifPoll(){ if(_notifPollT)return; pollDesktopNotifs(); _notifPollT=setInterval(pollDesktopNotifs,25000); }
function desktopAlertsInit(){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){ startNotifPoll(); return; }
  if(Notification.permission==='denied')return;
  // Show a small pill to opt in (browsers require a user gesture to grant).
  const pill=document.createElement('button');
  pill.textContent='🔔 Enable laptop alerts';
  pill.style.cssText='position:fixed;right:16px;bottom:16px;z-index:9999;background:var(--primary,#FF8C42);color:#0B0B0F;border:none;border-radius:20px;padding:10px 16px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35)';
  pill.onclick=async()=>{ try{ const p=await Notification.requestPermission(); if(p==='granted'){ pill.remove(); startNotifPoll(); } }catch(e){} };
  document.body.appendChild(pill);
}

setOrbPersona(ROUTE);applyOrbAmbient();setInterval(applyOrbAmbient,60000);
renderNav();load();desktopAlertsInit();
/* Prime money-watch once so the Market table reflects shipped subscription detection without a visit. */
setTimeout(()=>{try{loadMoney();}catch(e){}},1500);
setInterval(()=>{if(ROUTE!=='ask'&&!busy)load(true);},20000);
</script>
