name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App — typecheck & logic tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Pure-logic tests (no native)
        run: |
          npm run test:phase1 --if-present
          npx tsx tests/calendar.ts || true
          npx tsx tests/calorie.ts || true
          npx tsx tests/shield.ts || true
          npx tsx tests/toolRouter.ts || true

  dashboard:
    name: Dashboard — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Skip if dashboard absent
        id: guard
        run: |
          if [ -f package.json ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        if: steps.guard.outputs.exists == 'true'
      - run: npm run build
        if: steps.guard.outputs.exists == 'true'
